<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Organ</title>
<link rel="stylesheet" href="../widgets/widgets.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-deep); color: var(--text); height: 100%; }
  body {
    font-family: var(--font-mono);
    display: grid;
    align-items: center;
    justify-items: center;
  }

  /* Wood faceplate. Hammond B3 drawbars sit on a Bakelite plate; we're
     not chasing literal photo-realism, just dark warm panel + colored
     drawbar caps that read at a glance. */
  .panel {
    background: linear-gradient(180deg,
                  rgba(255,255,255,0.04),
                  rgba(0,0,0,0.04)),
                #2a1f17;
    border: 1px solid #1a120c;
    border-radius: 6px;
    padding: 14px 18px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.08),
                inset 0 -1px 0 rgba(0,0,0,0.4);
  }

  .panel-title {
    text-align: center;
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    color: #d9b48a;
    margin-bottom: 10px;
  }

  .bars {
    display: grid;
    grid-template-columns: repeat(9, max-content);
    gap: 10px;
    align-items: end;
  }

  /* Each drawbar = a vertical column. Header (pitch label) at top,
     numbered cap below it, slider underneath, footnote at bottom.
     We override Fader's track look so the "fill" reads as the drawbar
     itself extending out from the panel. */
  .bar { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .bar-pitch {
    font-size: 0.65rem;
    color: #d9b48a;
    letter-spacing: 0.04em;
  }
  .bar-cap {
    /* Decorative colour swatch only — Hammond-style colour coding for the
       drawbar's harmonic role. The pitch label sits above the cap, so the
       cap doesn't need text (which couldn't fit "5 1/3" / "2 2/3" / etc.
       at 22 px anyway). */
    width: 22px;
    height: 10px;
    border-radius: 3px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.25),
                inset 0 -1px 0 rgba(0,0,0,0.4);
  }

  /* Hammond drawbar colour scheme:
       16', 5 1/3'     — brown (sub / quint-sub fundamentals)
       8', 4', 2', 1'  — white (octave doublings of the fundamental)
       2 2/3', 1 3/5', 1 1/3' — black (non-octave upper harmonics) */
  .bar.brown .bar-cap { background: #6b3a16; color: #f4d8b0; }
  .bar.white .bar-cap { background: #ece1cf; color: #2a1f17; }
  .bar.black .bar-cap { background: #14110d; color: #e8e0d0; }

  .fader { gap: 2px; }
  .fader-track {
    --fader-h: 120px;
    --fader-thumb: 22px;
    --fader-track-w: 18px;
    background: #14100b;
    border-radius: 4px;
  }
  .fader-track::before { background: #0c0a07; }
  .fader-fill {
    --fader-track-w: 18px;
    border-radius: 3px;
    background: linear-gradient(180deg, #c4a274, #8a5c30);
  }
  .fader.dragging .fader-fill { background: linear-gradient(180deg, #e6c595, #a06c34); }
  .fader-thumb {
    width: 22px;
    height: 6px;
    background: #f4d8b0;
    border-radius: 1px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.6);
  }
  .fader-readout {
    color: #d9b48a;
    font-size: 0.65rem;
    min-width: 3ch;
  }
  .fader-label { display: none; }

  .bar-name {
    font-size: 0.55rem;
    color: rgba(217, 180, 138, 0.6);
    letter-spacing: 0.02em;
    margin-top: 2px;
  }
</style>
</head>
<body>
  <div class="panel">
    <div class="panel-title">PLINKEN ORGAN · DRAWBARS</div>
    <div class="bars" id="bars"></div>
  </div>

<script type="module">
  import { Fader } from '../widgets/fader.mjs';
  import { Transport } from '../widgets/transport.mjs';

  // Param ids = the cmaj endpoint handles the shim exposes via
  // clap.params. Source of truth: Organ.cmajor input declaration order
  // (drawbar_16 first → handle 2, …, drawbar_1 last → handle 10).
  const DRAWBARS = [
    { id:  2, pitch: "16'",    name: 'sub',     color: 'brown', def: 8 },
    { id:  3, pitch: "5 1/3'", name: '5th',     color: 'brown', def: 8 },
    { id:  4, pitch: "8'",     name: 'fund.',   color: 'white', def: 8 },
    { id:  5, pitch: "4'",     name: '2nd',     color: 'white', def: 0 },
    { id:  6, pitch: "2 2/3'", name: '3rd',     color: 'black', def: 0 },
    { id:  7, pitch: "2'",     name: '4th',     color: 'white', def: 0 },
    { id:  8, pitch: "1 3/5'", name: '5th h.',  color: 'black', def: 0 },
    { id:  9, pitch: "1 1/3'", name: '6th h.',  color: 'black', def: 0 },
    { id: 10, pitch: "1'",     name: '8th h.',  color: 'white', def: 0 },
  ];

  const barsEl = document.getElementById('bars');
  const widgets = new Map();

  for (const db of DRAWBARS) {
    const col = document.createElement('div');
    col.className = `bar ${db.color}`;

    const pitch = document.createElement('div');
    pitch.className = 'bar-pitch';
    pitch.textContent = db.pitch;
    col.appendChild(pitch);

    const cap = document.createElement('div');
    cap.className = 'bar-cap';
    col.appendChild(cap);

    const mount = document.createElement('div');
    col.appendChild(mount);

    const tag = document.createElement('div');
    tag.className = 'bar-name';
    tag.textContent = db.name;
    col.appendChild(tag);

    const f = new Fader(mount, {
      id: db.id,
      min: 0, max: 8, default: db.def, step: 1,
      label: db.pitch,
      format: v => String(Math.round(v)),
    });
    f.onChange((v, id) => {
      // The host's iframe-bridge forwards ArrayBuffer postMessages to
      // the plugin's webview.receive — which decodes the Set CBOR and
      // dispatches to setValue on the cmaj DSP. No extra wiring here.
      const buf = encodeSet(id, v);
      window.parent.postMessage(buf, '*');
    });
    widgets.set(db.id, f);
    barsEl.appendChild(col);
  }

  // Ready handshake: the plugin replies with a full param snapshot
  // ({params:{id:value}}) so the drawbars reflect its ACTUAL state —
  // which may have been restored from the project (clap.state) and
  // differ from the hardcoded defaults.
  const transport = new Transport();
  transport.onSnapshot((params) => {
    for (const [id, value] of params) {
      widgets.get(id)?.setValueFromHost(value);
    }
  });
  Promise.resolve().then(() => {
    window.parent.postMessage(encodeReady(), '*');
  });

  // Set message — must match widgets/cbor.mjs exactly (big-endian id +
  // f64 value). We duplicate the encoder here so the iframe doesn't
  // need to pull in the full cbor module just for this one shape.
  function encodeSet(id, value) {
    const buf = new ArrayBuffer(20);
    const v = new DataView(buf);
    v.setUint8(0, 0xa1);
    v.setUint8(1, 0x63);
    v.setUint8(2, 0x73); v.setUint8(3, 0x65); v.setUint8(4, 0x74);  // "set"
    v.setUint8(5, 0x82);
    v.setUint8(6, 0x1a);
    v.setUint32(7, id, false);
    v.setUint8(11, 0xfb);
    v.setFloat64(12, value, false);
    return buf;
  }
  function encodeReady() {
    return new Uint8Array([0x65, 0x72, 0x65, 0x61, 0x64, 0x79]).buffer;
  }
</script>
</body>
</html>
