<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Pulze</title>
<link rel="stylesheet" href="../widgets/widgets.css">
<style>
  .root { width: 100%; height: 100%; box-sizing: border-box; display: flex;
    flex-direction: column; gap: 8px; padding: 10px 12px; }
  .top { display: flex; align-items: center; gap: 14px; }
  .title { font-size: 0.78rem; font-weight: 600; }
  .banks { display: flex; gap: 4px; }
  .bank { font: inherit; font-size: 0.62rem; padding: 3px 9px; cursor: pointer;
    border-radius: 5px; border: 1px solid #3a3a3a; background: #222;
    color: #bbb; }
  .bank.on { background: #6a8aff; border-color: #6a8aff; color: #06101f; }
  .midi-led { display: flex; align-items: center; gap: 6px; font-size: 0.58rem;
    color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-left: auto; }
  .midi-led .dot { width: 11px; height: 11px; border-radius: 50%;
    background: #333; border: 1px solid #555; }
  .midi-led.on .dot { background: #37e06a; border-color: #37e06a; box-shadow: 0 0 8px #37e06a; }
  .grid { flex: 1; display: grid; grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(4, 1fr); gap: 6px; min-height: 0; }
  .pad { position: relative; border-radius: 7px; border: 1px solid #3a3a3a;
    background: #232323; display: flex; flex-direction: column; justify-content: space-between;
    padding: 5px 6px; box-sizing: border-box; overflow: hidden; cursor: pointer; }
  .pad.filled { background: #2a3550; border-color: #40567f; }
  .pad.drag { border-color: #6a8aff; background: #33406a; }
  .pad.hit { background: #6a8aff; }
  .pad .note { font-size: 0.56rem; color: #8fa2c9; }
  .pad .name { font-size: 0.58rem; color: #dfe6f5; word-break: break-all;
    line-height: 1.15; max-height: 2.3em; overflow: hidden; }
  .pad .empty { font-size: 0.56rem; color: #666; }
  .pad .load { position: absolute; top: 3px; right: 4px; font-size: 0.7rem;
    color: #8fa2c9; opacity: 0.55; padding: 1px 4px; border-radius: 4px; }
  .pad .load:hover { opacity: 1; background: #ffffff22; }
  .pad:active { transform: scale(0.97); }
</style>
</head>
<body>
<div class="root">
  <div class="top">
    <div class="title">Pulze</div>
    <div class="banks" id="banks"></div>
    <button class="bank" id="save" type="button">Save</button>
    <button class="bank" id="load" type="button">Load</button>
    <div class="midi-led" id="midi"><span class="dot"></span>MIDI</div>
  </div>
  <div class="grid" id="grid"></div>
</div>

<script type="module">
  import { Transport } from '../widgets/transport.mjs';

  const MIDI_ACTIVITY_ID = 0xFF00;
  // Akai MPC note layout — bank A pads 0..15 (top-left → bottom-right).
  const BANK_A_NOTES = [37,36,42,82, 40,38,46,44, 48,47,45,43, 49,55,51,53];
  const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  const noteName = (n) => `${NOTE_NAMES[n % 12]}${Math.floor(n/12)-1} (${n})`;

  const transport = new Transport();

  let bank = 0; // 0=A 1=B 2=C 3=D
  const padNames = {}; // slot -> name
  const banksEl = document.getElementById('banks');
  ['A','B','C','D'].forEach((label, i) => {
    const b = document.createElement('button');
    b.className = 'bank' + (i === 0 ? ' on' : '');
    b.textContent = label;
    b.onclick = () => { bank = i; renderBanks(); renderGrid(); };
    banksEl.appendChild(b);
  });
  function renderBanks() {
    [...banksEl.children].forEach((b, i) => b.classList.toggle('on', i === bank));
  }

  // one AudioContext for decoding dropped files
  let audioCtx;
  const gridEl = document.getElementById('grid');

  function slotFor(pad) { return bank * 16 + pad; }
  function noteFor(pad) { return bank === 0 ? BANK_A_NOTES[pad] : 36 + bank * 16 + pad; }

  function renderGrid() {
    gridEl.innerHTML = '';
    for (let pad = 0; pad < 16; pad++) {
      const slot = slotFor(pad);
      const el = document.createElement('div');
      el.className = 'pad' + (padNames[slot] ? ' filled' : '');
      const note = noteFor(pad);
      el.innerHTML = `<div class="load" title="load sample">⏏</div>` +
        `<div class="note">${noteName(note)}</div>` +
        (padNames[slot]
          ? `<div class="name">${padNames[slot]}</div>`
          : `<div class="empty">drop / ⏏</div>`);
      el.querySelector('.load').addEventListener('click', (e) => { e.stopPropagation(); pickFile(pad); });
      el.addEventListener('dragover', (e) => { e.preventDefault(); el.classList.add('drag'); });
      el.addEventListener('dragleave', () => el.classList.remove('drag'));
      el.addEventListener('drop', (e) => { e.preventDefault(); el.classList.remove('drag'); onDrop(e, pad); });
      // Drummers hit pads: note-ON on pointer DOWN (immediate), note-OFF on
      // UP (so gated pads release). Load is the ⏏ corner / drag-drop only.
      el.addEventListener('pointerdown', (e) => {
        el.setPointerCapture(e.pointerId);
        playPad(note, 1);
        el.classList.add('hit');
      });
      el.addEventListener('pointerup', () => { playPad(note, 0); el.classList.remove('hit'); });
      el.addEventListener('pointercancel', () => { playPad(note, 0); el.classList.remove('hit'); });
      gridEl.appendChild(el);
    }
  }

  function pickFile(pad) {
    const inp = document.createElement('input');
    inp.type = 'file';
    inp.accept = '.wav,.mp3,.aac,.flac,.ogg,.m4a,.aiff';
    inp.onchange = () => { if (inp.files[0]) loadFile(inp.files[0], pad); };
    inp.click();
  }
  function onDrop(e, pad) {
    const f = e.dataTransfer.files[0];
    if (f) loadFile(f, pad);
  }

  async function loadFile(file, pad) {
    audioCtx = audioCtx || new AudioContext();
    const buf = await file.arrayBuffer();
    const decoded = await audioCtx.decodeAudioData(buf);
    const slot = slotFor(pad);
    sendSample(slot, decoded);
    padNames[slot] = file.name;
    renderGrid();
  }

  // Encode + post a PLSP sample message to the plugin (whole sample, one
  // chunk). Layout must match crates/sample-core assembler.rs exactly.
  function sendSample(slot, audioBuffer) {
    const channels = Math.min(2, audioBuffer.numberOfChannels);
    const frames = audioBuffer.length;
    const rate = Math.round(audioBuffer.sampleRate);
    const left = audioBuffer.getChannelData(0);
    const right = channels === 2 ? audioBuffer.getChannelData(1) : null;
    const pcmBytes = frames * channels * 4;
    const payloadLen = 32 + pcmBytes;
    const out = new ArrayBuffer(10 + payloadLen);
    const dv = new DataView(out);
    const u8 = new Uint8Array(out);
    u8.set([0xa1, 0x63, 0x73, 0x6d, 0x70, 0x5a], 0); // {"smp": bytes(
    dv.setUint32(6, payloadLen, false);              // BE length
    dv.setUint32(10, 0x504c5350, true);              // "PLSP"
    dv.setUint32(14, 1, true);                       // version
    dv.setUint32(18, slot, true);
    dv.setUint32(22, rate, true);
    dv.setUint32(26, channels, true);
    dv.setUint32(30, frames, true);
    dv.setUint32(34, 0, true);                       // chunk_start
    dv.setUint32(38, frames, true);                  // chunk_frames
    // PCM at byte 42 is NOT 4-aligned, so a Float32Array view there throws.
    // Copy the raw bytes instead.
    const dst = new Uint8Array(out, 42);
    dst.set(new Uint8Array(left.buffer, left.byteOffset, frames * 4), 0);
    if (right) dst.set(new Uint8Array(right.buffer, right.byteOffset, frames * 4), frames * 4);
    window.parent.postMessage(out, '*');
  }

  // Build the kit manifest from the current pads (per the sample-library
  // format). Sample PCM is stored by the host content-addressed; the
  // manifest only holds metadata + sample_id refs. Real save/load lands
  // with the host sample-library interface (write/read/save-manifest).
  function buildManifest() {
    const pads = [];
    for (const slot in padNames) {
      pads.push({ note: 0, name: padNames[slot], sample_id: `slot:${slot}` });
    }
    return { library_version: 1, kits: [{ name: 'My Kit', pads }], samples: {} };
  }
  document.getElementById('save').onclick = () => {
    const json = JSON.stringify(buildManifest());
    window.parent.postMessage(new TextEncoder().encode('SAVE-KIT\n' + json).buffer, '*');
  };
  document.getElementById('load').onclick = () => {
    window.parent.postMessage(new TextEncoder().encode('LOAD-KIT').buffer, '*');
  };

  // Audition a pad from the UI: post [0x21, on, note, vel] → plugin on_message.
  function playPad(note, on, vel = 110) {
    window.parent.postMessage(new Uint8Array([0x21, on ? 1 : 0, note, on ? vel : 0]).buffer, '*');
  }

  // MIDI light — plugin pushes MIDI_ACTIVITY_ID 1/0.
  const midiEl = document.getElementById('midi');
  transport.onSnapshot((params) => {
    for (const [id, value] of params) {
      if (id === PID_MASTER) master.setValueFromHost(value);
      if (id === MIDI_ACTIVITY_ID) midiEl.classList.toggle('on', value > 0.5);
    }
  });
  transport.sendReady();
  renderGrid();
</script>
</body>
</html>
