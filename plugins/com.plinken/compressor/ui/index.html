<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Compressor</title>
<link rel="stylesheet" href="../widgets/widgets.css">
<style>
  .root { width: 100%; height: 100%; box-sizing: border-box; display: grid; align-items: center; }
  .root.expanded { grid-template-rows: auto 1fr; padding: 12px 16px; gap: 10px; }
  .root.expanded .title { text-align: center; font-size: 0.78rem; }
  .body { display: flex; align-items: flex-start; gap: 18px; justify-content: center; }
  .controls { display: flex; align-items: flex-start; gap: 14px; }
  .meters {
    display: flex; align-items: flex-start; gap: 12px;
    border-left: 1px solid var(--border-soft); padding-left: 16px;
  }
  .root.compact {
    grid-template-columns: max-content 1fr max-content; gap: 8px; padding: 0 10px;
    --pot-size: 32px; --meter-w: 8px; --meter-h: 36px;
  }
  .root.compact .title { font-size: 0.6rem; }
  .root.compact .controls { gap: 9px; }
  .root.compact .pot-label, .root.compact .pot-readout,
  .root.compact .meter-stack .label, .root.compact .meter-stack .readout { display: none; }
</style>
</head>
<body>
<div class="root expanded" id="root">
  <div class="title">Compressor</div>
  <div class="body">
    <div class="controls">
      <div id="ctrl-threshold"></div>
      <div id="ctrl-ratio"></div>
      <div id="ctrl-attack"></div>
      <div id="ctrl-release"></div>
      <div id="ctrl-knee"></div>
      <div id="ctrl-makeup"></div>
    </div>
    <div class="meters">
      <div id="meter-gr"></div>
      <div id="meter-peak"></div>
    </div>
  </div>
</div>

<script type="module">
  import { Pot } from '../widgets/pot.mjs';
  import { Meter } from '../widgets/meter.mjs';
  import { Transport } from '../widgets/transport.mjs';

  // Param IDs — must match plugins/com.plinken/compressor/src/lib.rs
  const PID_THRESHOLD = 0x0001;
  const PID_RATIO = 0x0002;
  const PID_ATTACK = 0x0003;
  const PID_RELEASE = 0x0004;
  const PID_MAKEUP = 0x0005;
  const PID_KNEE = 0x0006;
  const METER_PEAK_ID = 0x1000;
  const METER_GR_ID = 0x1001;

  const transport = new Transport();

  const threshold = new Pot(document.getElementById('ctrl-threshold'),
    { id: PID_THRESHOLD, min: -48, max: 0, default: -18, unit: 'dB', label: 'Thresh',
      format: v => `${v.toFixed(1)} dB` });
  const ratio = new Pot(document.getElementById('ctrl-ratio'),
    { id: PID_RATIO, min: 1, max: 20, default: 4, log: true, label: 'Ratio',
      format: v => `${v.toFixed(1)}:1` });
  const attack = new Pot(document.getElementById('ctrl-attack'),
    { id: PID_ATTACK, min: 0.1, max: 100, default: 10, log: true, unit: 'ms', label: 'Attack',
      format: v => v < 10 ? `${v.toFixed(1)} ms` : `${Math.round(v)} ms` });
  const release = new Pot(document.getElementById('ctrl-release'),
    { id: PID_RELEASE, min: 10, max: 1000, default: 120, log: true, unit: 'ms', label: 'Release',
      format: v => `${Math.round(v)} ms` });
  const knee = new Pot(document.getElementById('ctrl-knee'),
    { id: PID_KNEE, min: 0, max: 24, default: 6, unit: 'dB', label: 'Knee',
      format: v => `${v.toFixed(1)} dB` });
  const makeup = new Pot(document.getElementById('ctrl-makeup'),
    { id: PID_MAKEUP, min: 0, max: 24, default: 0, unit: 'dB', label: 'Makeup',
      format: v => `+${v.toFixed(1)} dB` });

  const controls = [threshold, ratio, attack, release, knee, makeup];
  for (const c of controls) c.onChange((v, id) => transport.sendSet(id, v));

  const gr = new Meter(document.getElementById('meter-gr'),
    { mode: 'gr', minDb: -24, maxDb: 0, label: 'GR' });
  const peak = new Meter(document.getElementById('meter-peak'),
    { mode: 'peak', minDb: -60, maxDb: 0, hotDb: -6, clipDb: -0.5, label: 'Peak' });
  gr.setDb(0);
  peak.setDb(-Infinity);

  const widgets = new Map([
    [PID_THRESHOLD, threshold], [PID_RATIO, ratio], [PID_ATTACK, attack],
    [PID_RELEASE, release], [PID_KNEE, knee], [PID_MAKEUP, makeup],
  ]);
  transport.onSnapshot(params => {
    for (const [id, value] of params) {
      const w = widgets.get(id);
      if (w) { w.setValueFromHost(value); continue; }
      if (id === METER_PEAK_ID) peak.setDb(value);
      else if (id === METER_GR_ID) gr.setDb(value);
    }
  });
  transport.sendReady();

  function applyLayout() {
    const root = document.getElementById('root');
    const compact = window.innerWidth < 380 || window.innerHeight < 90;
    root.classList.toggle('compact', compact);
    root.classList.toggle('expanded', !compact);
  }
  applyLayout();
  window.addEventListener('resize', applyLayout);
</script>
</body>
</html>
